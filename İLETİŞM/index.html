<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gerçek Anonim Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #111b21; color: #e9edef; }
        .chat-area { height: calc(100vh - 160px); overflow-y: auto; }
    </style>
</head>
<body class="flex flex-col h-screen max-w-2xl mx-auto border-x border-gray-800">

    <div class="bg-[#2a3942] p-4 flex justify-between items-center">
        <h2 class="font-bold">Anonim Chat</h2>
        <span id="displayId" class="text-emerald-400 font-mono">Bağlanıyor...</span>
    </div>

    <div id="messages" class="flex-1 p-4 flex flex-col gap-2 chat-area bg-[#0b141a]"></div>

    <div class="bg-[#2a3942] p-4 flex gap-2">
        <input id="msgInput" type="text" placeholder="Mesaj yaz..." class="flex-1 bg-[#202c33] p-2 rounded outline-none">
        <button onclick="sendMessage()" class="bg-emerald-500 text-black px-4 py-2 rounded font-bold">Gönder</button>
    </div>

    <script>
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        const displayId = document.getElementById('displayId');
        let myCurrentId = "";

        // ID'mizi alalım
        socket.on('my-id', (id) => {
            myCurrentId = id;
            displayId.innerText = "Senin ID: " + id;
        });

        // Mesaj gönder
        function sendMessage() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                socket.emit('send-message', { text: input.value });
                input.value = "";
            }
        }

        // Mesaj geldiğinde ekrana yaz
        socket.on('receive-message', (data) => {
            const isMe = data.id === myCurrentId;
            const msgHtml = `
                <div class="${isMe ? 'self-end bg-[#005c4b]' : 'self-start bg-[#202c33]'} p-2 rounded max-w-[80%]">
                    <p class="text-[10px] ${isMe ? 'text-emerald-200' : 'text-gray-400'}">${data.id}</p>
                    <p class="text-sm">${data.text}</p>
                    <span class="text-[10px] text-gray-500 float-right">${data.time}</span>
                </div>
            `;
            messagesDiv.innerHTML += msgHtml;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>
</body>
</html>
