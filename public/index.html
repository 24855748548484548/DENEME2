<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeChat | Eğlenceli Sohbet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; overflow: hidden; }
        .neon-text { text-shadow: 0 0 10px rgba(16, 185, 129, 0.6); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .msg-area { height: calc(100vh - 180px); }
        .gradient-bg { background: linear-gradient(135deg, #1e1b4b 0%, #020617 100%); }
        .online-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="gradient-bg flex items-center justify-center min-h-screen">

    <div id="login-screen" class="w-full max-w-md p-10 glass-panel rounded-[2rem] shadow-2xl animate__animated animate__backInDown">
        <div class="text-center mb-10">
            <span class="inline-block px-4 py-1 rounded-full bg-emerald-500/10 text-emerald-500 text-xs font-bold mb-4">CANLI SOHBET PLATFORMU</span>
            <h1 class="text-5xl font-black neon-text italic">Vibe<span class="text-emerald-500">Chat</span></h1>
        </div>
        <div class="space-y-4">
            <input id="uName" type="text" placeholder="Havalı Bir İsim Seç..." class="w-full bg-white/5 p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-500 transition-all border border-white/10">
            <input id="uPass" type="password" placeholder="Gizli Şifren..." class="w-full bg-white/5 p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-500 transition-all border border-white/10">
            <input id="uRoom" type="text" placeholder="Hangi Odaya Gidiyoruz?" class="w-full bg-white/5 p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-500 transition-all border border-white/10">
            <button onclick="enterVibe()" class="w-full bg-emerald-500 hover:bg-emerald-400 p-5 rounded-2xl font-black text-black shadow-[0_0_20px_rgba(16,185,129,0.4)] transition-all transform active:scale-95">SOHBETE DAL!</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden w-full h-screen lg:h-[90vh] lg:max-w-6xl glass-panel lg:rounded-[2.5rem] flex flex-row overflow-hidden animate__animated animate__fadeIn">
        
        <div class="hidden md:flex w-64 border-r border-white/10 flex-col p-6 bg-black/20">
            <h3 class="text-xs font-bold text-slate-500 tracking-[0.2em] mb-6 uppercase">Çevrimiçi Tayfa</h3>
            <div id="online-list" class="space-y-4 overflow-y-auto"></div>
        </div>

        <div class="flex-1 flex flex-col">
            <header class="p-6 border-b border-white/10 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-emerald-500 rounded-full online-dot shadow-[0_0_8px_#10b981]"></div>
                    <h2 id="roomName" class="text-xl font-bold tracking-tight"></h2>
                </div>
                <button onclick="location.reload()" class="text-slate-400 hover:text-white transition-colors">Ayrıl</button>
            </header>

            <div id="msgBox" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4 msg-area"></div>

            <footer class="p-6">
                <div class="flex items-center gap-3 bg-white/5 p-2 rounded-3xl border border-white/10 focus-within:border-emerald-500/50 transition-all">
                    <input id="mInput" type="text" placeholder="Bir şeyler yaz..." class="flex-1 bg-transparent p-3 outline-none px-4 text-sm">
                    <button onclick="sendVibe()" class="bg-emerald-500 text-black w-12 h-12 rounded-2xl flex items-center justify-center hover:shadow-[0_0_15px_rgba(16,185,129,0.5)] transition-all">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";

        function enterVibe() {
            const username = document.getElementById('uName').value;
            const password = document.getElementById('uPass').value;
            const room = document.getElementById('uRoom').value;
            if(username && password && room) {
                myName = username;
                socket.emit('auth-attempt', { username, password, room });
            }
        }

        socket.on('login-success', (data) => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('roomName').innerText = "Oda: " + data.room;
        });

        socket.on('update-online-list', (list) => {
            const container = document.getElementById('online-list');
            container.innerHTML = list.map(user => `
                <div class="flex items-center gap-3 animate__animated animate__fadeInLeft">
                    <div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center text-[10px] text-emerald-400 font-bold border border-emerald-500/30">${user[0].toUpperCase()}</div>
                    <span class="text-sm font-medium text-slate-300">${user}</span>
                </div>
            `).join('');
        });

        function sendVibe() {
            const i = document.getElementById('mInput');
            if(i.value.trim()) {
                socket.emit('send-message', { text: i.value });
                i.value = "";
            }
        }

        socket.on('receive-message', (data) => {
            const isMe = data.sender === myName;
            const html = `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} animate__animated animate__fadeInUp animate__faster">
                    <div class="${isMe ? 'bg-emerald-500 text-black rounded-br-none' : 'bg-white/10 text-white rounded-bl-none'} p-4 rounded-[1.5rem] max-w-[80%] shadow-xl">
                        <p class="text-[10px] font-black uppercase tracking-tighter mb-1 opacity-50">${data.sender}</p>
                        <p class="text-sm font-medium leading-relaxed">${data.text}</p>
                    </div>
                    <span class="text-[8px] text-slate-500 mt-1 px-2">${data.time}</span>
                </div>
            `;
            const b = document.getElementById('msgBox');
            b.innerHTML += html;
            b.scrollTop = b.scrollHeight;
        });

        document.getElementById('mInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendVibe(); });
    </script>
</body>
</html>
