<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowVibe | Secure Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #f1f5f9 100%); background-attachment: fixed; color: #1e293b; height: 100vh; margin: 0; overflow: hidden; }
        .auth-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        .chat-container { background: white; border: 1px solid #e2e8f0; }
        
        /* Mesaj Balonları ve Kaydırma Efekti */
        .msg-wrapper { position: relative; transition: transform 0.2s ease; cursor: pointer; user-select: none; }
        .msg-me { background: #1e293b; color: white; border-radius: 18px 18px 0 18px; }
        .msg-them { background: #f1f5f9; color: #1e293b; border-radius: 18px 18px 18px 0; border: 1px solid #e2e8f0; }
        
        /* Cevap Verilen Mesaj Görünümü */
        .reply-preview { background: rgba(0,0,0,0.05); border-left: 4px solid #1e293b; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 0.75rem; color: #64748b; }
        .reply-bar { background: #f8fafc; border-top: 1px solid #e2e8f0; padding: 12px 24px; display: none; align-items: center; justify-content: space-between; }
    </style>
</head>
<body class="flex items-center justify-center p-0 md:p-4">

    <div id="login-screen" class="w-full max-w-md p-10 auth-card rounded-3xl animate__animated animate__fadeIn">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-slate-900 rounded-xl mb-4 shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">GlowVibe</h1>
            <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest mt-1">Güvenli Bağlantı</p>
        </div>
        <div class="space-y-4">
            <input id="uName" type="text" placeholder="Kullanıcı Adı" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-slate-900 transition-all font-medium">
            <div class="grid grid-cols-2 gap-2">
                <input id="uRoom" type="text" placeholder="Oda" class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-slate-900 font-medium">
                <input id="uRoomPass" type="password" placeholder="Şifre" class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-slate-900 font-medium">
            </div>
            <button onclick="enterGlow()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold text-sm tracking-widest hover:bg-slate-800 transition-all shadow-xl">BAĞLAN</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden w-full h-full md:h-[90vh] max-w-5xl chat-container md:rounded-3xl flex flex-col overflow-hidden shadow-2xl animate__animated animate__fadeIn">
        <header class="p-5 border-b border-slate-100 flex justify-between items-center bg-white">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <h2 id="roomName" class="font-bold text-slate-800">Terminal</h2>
            </div>
            <button onclick="location.reload()" class="text-[10px] font-black text-slate-400 hover:text-red-500 tracking-widest uppercase">Güvenli Çıkış</button>
        </header>

        <div id="msgBox" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4 bg-slate-50/50"></div>

        <div id="reply-bar" class="reply-bar">
            <div class="flex flex-col">
                <span id="reply-target-name" class="text-[10px] font-bold text-slate-900 uppercase">Cevaplanıyor</span>
                <span id="reply-target-text" class="text-xs text-slate-500 italic truncate max-w-md">Mesaj içeriği...</span>
            </div>
            <button onclick="cancelReply()" class="p-1 hover:bg-slate-200 rounded-full transition-all">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <footer class="p-5 bg-white border-t border-slate-100">
            <div class="flex items-center gap-3">
                <input id="mInput" type="text" placeholder="Güvenli mesaj..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none focus:bg-white border border-transparent focus:border-slate-200 text-sm">
                <button onclick="sendGlow()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold text-xs hover:scale-105 transition-all">GÖNDER</button>
            </div>
        </footer>
    </div>

    <script>
        const socket = io();
        let myName = "";
        let replyingTo = null;

        function enterGlow() {
            const user = document.getElementById('uName').value;
            const room = document.getElementById('uRoom').value;
            const rPass = document.getElementById('uRoomPass').value;
            if(user && room && rPass) {
                myName = user;
                socket.emit('auth-attempt', { username: user, room: room, roomPass: rPass });
            }
        }

        socket.on('login-success', (data) => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('roomName').innerText = data.room;
        });

        socket.on('login-error', (msg) => alert(msg));

        // Cevaplama Başlatma Fonksiyonu
        function setReply(sender, text) {
            replyingTo = { sender, text };
            document.getElementById('reply-bar').style.display = 'flex';
            document.getElementById('reply-target-name').innerText = sender;
            document.getElementById('reply-target-text').innerText = text;
            document.getElementById('mInput').focus();
        }

        function cancelReply() {
            replyingTo = null;
            document.getElementById('reply-bar').style.display = 'none';
        }

        function sendGlow() {
            const i = document.getElementById('mInput');
            if(i.value.trim()) {
                socket.emit('send-message', { 
                    text: i.value,
                    reply: replyingTo 
                });
                i.value = "";
                cancelReply();
            }
        }

        socket.on('receive-message', (data) => {
            const isMe = data.sender === myName;
            const html = `
                <div class="msg-wrapper flex flex-col ${isMe ? 'items-end' : 'items-start'}" 
                     onclick="setReply('${data.sender}', '${data.text}')" 
                     title="Cevaplamak için tıkla">
                    
                    <div class="px-5 py-3 ${isMe ? 'msg-me shadow-lg shadow-slate-200' : 'msg-them shadow-sm'} max-w-[85%]">
                        ${data.reply ? `
                            <div class="reply-preview ${isMe ? 'bg-white/10 text-white/80 border-white/30' : 'bg-slate-200/50'}">
                                <strong>${data.reply.sender}</strong>: ${data.reply.text}
                            </div>
                        ` : ''}
                        ${!isMe ? `<p class="text-[9px] font-bold opacity-50 mb-1 uppercase tracking-widest">${data.sender}</p>` : ''}
                        <p class="text-sm font-medium leading-relaxed">${data.text}</p>
                    </div>
                </div>
            `;
            const b = document.getElementById('msgBox');
            b.innerHTML += html;
            b.scrollTop = b.scrollHeight;
        });

        document.getElementById('mInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendGlow(); });
    </script>
</body>
</html>
