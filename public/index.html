<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowVibe | Premium Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        /* Koyu ve Beyaz Geçişli Arka Plan */
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #ffffff 100%);
            background-size: 400% 400%;
            animation: bgShift 15s ease infinite;
            color: white; 
            height: 100vh;
            overflow: hidden; 
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Gökkuşağı Giriş Paneli */
        .rainbow-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border: 4px solid;
            border-image: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet) 1;
            animation: borderRotate 3s linear infinite;
        }

        @keyframes borderRotate {
            0% { border-image-source: linear-gradient(0deg, red, orange, yellow, green, blue, indigo, violet); }
            100% { border-image-source: linear-gradient(360deg, red, orange, yellow, green, blue, indigo, violet); }
        }

        .glass-chat { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Oda Geçiş Animasyonu */
        .room-transition { animation: slideInRight 0.5s ease-out; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="login-screen" class="w-full max-w-md p-10 rainbow-panel rounded-xl shadow-2xl animate__animated animate__backInDown">
        <div class="text-center mb-8">
            <h1 class="text-6xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-red-500 via-green-500 to-blue-500 animate-pulse">GlowVibe</h1>
            <p class="text-white/70 text-xs mt-2 font-bold tracking-widest uppercase">Renkli & Şifreli Sohbet</p>
        </div>
        
        <div class="space-y-4">
            <input id="uName" type="text" placeholder="Kullanıcı Adı" class="w-full bg-white/10 p-4 rounded-xl outline-none focus:ring-2 ring-white border border-white/20 text-white placeholder-white/50">
            <input id="uPass" type="password" placeholder="Profil Şifren" class="w-full bg-white/10 p-4 rounded-xl outline-none focus:ring-2 ring-white border border-white/20 text-white placeholder-white/50">
            
            <div class="grid grid-cols-2 gap-2">
                <input id="uRoom" type="text" placeholder="Oda Adı" class="bg-white/10 p-4 rounded-xl outline-none border border-white/20 text-white">
                <input id="uRoomPass" type="password" placeholder="Oda Şifresi" class="bg-white/10 p-4 rounded-xl outline-none border border-white/20 text-white">
            </div>
            
            <button onclick="enterGlow()" class="w-full bg-white text-black p-5 rounded-xl font-black hover:bg-opacity-80 transition-all transform active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.3)]">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden w-full h-screen lg:h-[90vh] lg:max-w-6xl glass-chat lg:rounded-[2rem] flex flex-row overflow-hidden room-transition">
        
        <div class="hidden md:flex w-72 border-r border-white/10 flex-col p-8 bg-black/60">
            <div class="flex items-center gap-2 mb-8">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
                <h3 class="text-xs font-bold text-white tracking-widest uppercase">Kullanıcılar</h3>
            </div>
            <div id="online-list" class="space-y-4"></div>
        </div>

        <div class="flex-1 flex flex-col bg-white/5">
            <header class="p-6 border-b border-white/10 flex justify-between items-center bg-black/40">
                <div class="flex items-center gap-4">
                    <div id="roomIcon" class="w-12 h-12 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">?</div>
                    <div>
                        <h2 id="roomName" class="text-xl font-bold text-white">Oda</h2>
                        <div class="flex items-center gap-1">
                            <svg class="w-3 h-3 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                            <span class="text-[10px] text-white/50 font-bold uppercase">Şifreli Oda</span>
                        </div>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white p-3 rounded-xl transition-all font-bold">Çıkış</button>
            </header>

            <div id="msgBox" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4"></div>

            <footer class="p-6 bg-black/20">
                <div class="flex items-center gap-3 bg-white/10 p-2 rounded-2xl border border-white/10">
                    <input id="mInput" type="text" placeholder="Mesaj yaz..." class="flex-1 bg-transparent p-4 outline-none text-white text-sm">
                    <button onclick="sendGlow()" class="bg-white text-black px-6 py-4 rounded-xl font-bold hover:scale-105 transition-all">Gönder</button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";

        function enterGlow() {
            const user = document.getElementById('uName').value;
            const pass = document.getElementById('uPass').value;
            const room = document.getElementById('uRoom').value;
            const rPass = document.getElementById('uRoomPass').value;
            
            if(user && room && rPass) {
                myName = user;
                // Sunucuya oda şifresiyle beraber gönderiyoruz
                socket.emit('auth-attempt', { username: user, password: pass, room: room, roomPass: rPass });
            } else {
                alert("Lütfen tüm alanları (Oda şifresi dahil) doldur!");
            }
        }

        socket.on('login-success', (data) => {
            document.getElementById('login-screen').classList.replace('animate__backInDown', 'animate__backOutUp');
            setTimeout(() => {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
                document.getElementById('roomName').innerText = data.room;
                document.getElementById('roomIcon').innerText = data.room[0].toUpperCase();
            }, 500);
        });

        socket.on('login-error', (msg) => { alert(msg); });

        function sendGlow() {
            const i = document.getElementById('mInput');
            if(i.value.trim()) {
                socket.emit('send-message', { text: i.value });
                i.value = "";
            }
        }

        socket.on('receive-message', (data) => {
            const isMe = data.sender === myName;
            const html = `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} animate__animated animate__fadeInUp animate__faster">
                    <div class="max-w-[80%] ${isMe ? 'bg-white text-black' : 'bg-white/10 text-white'} p-4 rounded-2xl shadow-xl">
                        ${!isMe ? `<p class="text-[10px] font-black opacity-50 mb-1 uppercase">${data.sender}</p>` : ''}
                        <p class="text-sm font-medium">${data.text}</p>
                    </div>
                </div>
            `;
            const b = document.getElementById('msgBox');
            b.innerHTML += html;
            b.scrollTop = b.scrollHeight;
        });

        socket.on('update-online-list', (list) => {
            document.getElementById('online-list').innerHTML = list.map(u => `
                <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5">
                    <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center text-[10px] font-bold">${u[0]}</div>
                    <span class="text-sm font-bold text-white/80">${u}</span>
                </div>
            `).join('');
        });

        document.getElementById('mInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendGlow(); });
    </script>
</body>
</html>
