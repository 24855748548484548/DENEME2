<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Anon Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #0b141a; color: #e9edef; font-family: sans-serif; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; }
        .messages-area { height: calc(100vh - 160px); overflow-y: auto; }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-2xl mx-auto h-screen border-x border-gray-800 shadow-2xl flex flex-col">

    <div id="login-container" class="flex-1 flex flex-col justify-center p-8 space-y-4">
        <div class="text-center">
            <h1 class="text-4xl font-black text-emerald-500 mb-2">CHAT APP</h1>
            <p class="text-gray-400 text-sm">Profil oluştur ve odaya bağlan.</p>
        </div>
        <input id="uName" type="text" placeholder="Kullanıcı Adı" class="w-full bg-[#202c33] p-4 rounded-lg outline-none border border-transparent focus:border-emerald-500">
        <input id="uPass" type="password" placeholder="Şifre" class="w-full bg-[#202c33] p-4 rounded-lg outline-none border border-transparent focus:border-emerald-500">
        <input id="uRoom" type="text" placeholder="Oda Adı" class="w-full bg-[#202c33] p-4 rounded-lg outline-none border border-transparent focus:border-emerald-500">
        <button onclick="handleAuth()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-lg font-bold transition-all">GİRİŞ / KAYIT</button>
        <p id="error-text" class="text-red-500 text-center text-sm font-bold"></p>
    </div>

    <div id="chat-container" class="hidden flex flex-col h-full">
        <div class="bg-[#202c33] p-4 flex justify-between items-center">
            <div>
                <h2 id="currentRoomDisplay" class="font-bold text-emerald-500">Oda</h2>
                <span id="currentUserDisplay" class="text-[10px] text-gray-400 font-mono"></span>
            </div>
            <button onclick="location.reload()" class="text-xs text-gray-400 hover:text-white">Çıkış</button>
        </div>

        <div id="msgBox" class="flex-1 p-4 flex flex-col gap-2 messages-area chat-bg"></div>

        <div class="bg-[#202c33] p-3 flex gap-2 items-center">
            <input id="mInput" type="text" placeholder="Mesaj yaz..." class="flex-1 bg-[#2a3942] p-3 rounded-full px-6 outline-none text-sm">
            <button onclick="send()" class="bg-emerald-500 text-black w-12 h-12 rounded-full flex items-center justify-center font-bold">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";

        function handleAuth() {
            const username = document.getElementById('uName').value;
            const password = document.getElementById('uPass').value;
            const room = document.getElementById('uRoom').value;
            
            if(username && password && room) {
                myName = username;
                socket.emit('auth-attempt', { username, password, room });
            } else {
                document.getElementById('error-text').innerText = "Boş alan bırakmayın!";
            }
        }

        socket.on('login-success', (data) => {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
            document.getElementById('currentRoomDisplay').innerText = "#" + data.room;
            document.getElementById('currentUserDisplay').innerText = "@" + data.username;
        });

        socket.on('login-error', (err) => {
            document.getElementById('error-text').innerText = err;
        });

        function send() {
            const input = document.getElementById('mInput');
            if(input.value.trim()) {
                socket.emit('send-message', { text: input.value });
                input.value = "";
            }
        }

        socket.on('receive-message', (data) => {
            const isMe = data.sender === myName;
            const html = `
                <div class="${isMe ? 'self-end bg-[#005c4b]' : 'self-start bg-[#202c33]'} p-2 px-3 rounded-xl max-w-[80%] shadow-sm">
                    <p class="text-[9px] font-bold text-emerald-400">${data.sender}</p>
                    <p class="text-sm">${data.text}</p>
                    <span class="text-[9px] text-gray-500 float-right mt-1">${data.time}</span>
                </div>
            `;
            const box = document.getElementById('msgBox');
            box.innerHTML += html;
            box.scrollTop = box.scrollHeight;
        });

        document.getElementById('mInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
