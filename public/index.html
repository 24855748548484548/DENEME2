<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowVibe | Secure Communication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            /* Koyu Lacivert ve Açık Gri Geçişi (Banka Teması) */
            background: linear-gradient(135deg, #0f172a 0%, #f8fafc 100%);
            background-attachment: fixed;
            color: #1e293b; 
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .input-field {
            background: #f1f5f9;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .input-field:focus {
            background: white;
            border-color: #2563eb;
            outline: none;
        }

        .btn-primary {
            background: #1e293b;
            color: white;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #0f172a;
            transform: translateY(-1px);
        }

        .chat-container {
            background: white;
            border: 1px solid #e2e8f0;
        }

        /* Mesaj Balonları */
        .msg-me { background: #2563eb; color: white; border-radius: 18px 18px 0 18px; }
        .msg-them { background: #f1f5f9; color: #1e293b; border-radius: 18px 18px 18px 0; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="login-screen" class="w-full max-w-md p-10 auth-card rounded-3xl overflow-hidden">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-900 rounded-2xl mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">GlowVibe</h1>
            <p class="text-slate-500 text-sm font-medium">Uçtan Uca Güvenli Protokol</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Kullanıcı Erişimi</label>
                <input id="uName" type="text" placeholder="İsim" class="w-full mt-1 p-4 rounded-xl input-field text-slate-900 font-semibold">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Oda Kodu</label>
                    <input id="uRoom" type="text" placeholder="ID" class="w-full mt-1 p-4 rounded-xl input-field text-slate-900 font-semibold">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase ml-1">Şifreleme</label>
                    <input id="uRoomPass" type="password" placeholder="Pass" class="w-full mt-1 p-4 rounded-xl input-field text-slate-900 font-semibold">
                </div>
            </div>
            
            <button onclick="enterGlow()" class="w-full btn-primary p-5 rounded-xl font-bold text-sm tracking-widest shadow-lg">SİSTEME GİRİŞ YAP</button>
        </div>
        <p class="text-center mt-6 text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Encrypted by GlowVibe Core v2.0</p>
    </div>

    <div id="chat-screen" class="hidden w-full h-[90vh] max-w-5xl chat-container rounded-3xl flex flex-row overflow-hidden shadow-2xl">
        
        <div class="hidden md:flex w-64 bg-slate-50 border-r border-slate-200 flex-col p-6">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Bağlı Birimler</h3>
            <div id="online-list" class="space-y-2"></div>
        </div>

        <div class="flex-1 flex flex-col bg-white">
            <header class="p-6 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-emerald-500 rounded-full"></div>
                    <h2 id="roomName" class="text-lg font-bold text-slate-800">Güvenli Hat</h2>
                </div>
                <button onclick="location.reload()" class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors">OTURUMU KAPAT</button>
            </header>

            <div id="msgBox" class="flex-1 p-8 overflow-y-auto flex flex-col gap-4 bg-slate-50/30"></div>

            <footer class="p-6 border-t border-slate-100 bg-white">
                <div class="flex items-center gap-3">
                    <input id="mInput" type="text" placeholder="Mesajınızı buraya güvenle yazın..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none focus:bg-white focus:ring-2 ring-slate-200 text-sm">
                    <button onclick="sendGlow()" class="btn-primary px-8 py-4 rounded-2xl font-bold text-xs">GÖNDER</button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";

        function enterGlow() {
            const user = document.getElementById('uName').value;
            const room = document.getElementById('uRoom').value;
            const rPass = document.getElementById('uRoomPass').value;
            
            if(user && room && rPass) {
                myName = user;
                socket.emit('auth-attempt', { username: user, room: room, roomPass: rPass });
            } else {
                alert("Güvenlik protokolü gereği tüm alanları doldurunuz.");
            }
        }

        socket.on('login-success', (data) => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('roomName').innerText = "Terminal: " + data.room;
        });

        socket.on('login-error', (msg) => { alert(msg); });

        function sendGlow() {
            const i = document.getElementById('mInput');
            if(i.value.trim()) {
                socket.emit('send-message', { text: i.value });
                i.value = "";
            }
        }

        socket.on('receive-message', (data) => {
            const isMe = data.sender === myName;
            const html = `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    <div class="px-5 py-3 ${isMe ? 'msg-me shadow-blue-200' : 'msg-them shadow-sm'} shadow-md max-w-[70%]">
                        ${!isMe ? `<p class="text-[9px] font-bold opacity-60 mb-1 uppercase tracking-widest">${data.sender}</p>` : ''}
                        <p class="text-sm font-medium leading-relaxed">${data.text}</p>
                    </div>
                </div>
            `;
            const b = document.getElementById('msgBox');
            b.innerHTML += html;
            b.scrollTop = b.scrollHeight;
        });

        socket.on('update-online-list', (list) => {
            document.getElementById('online-list').innerHTML = list.map(u => `
                <div class="flex items-center gap-2 p-2 rounded-lg hover:bg-white transition-all border border-transparent hover:border-slate-200">
                    <div class="w-2 h-2 rounded-full bg-slate-300"></div>
                    <span class="text-xs font-bold text-slate-600">${u}</span>
                </div>
            `).join('');
        });

        document.getElementById('mInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendGlow(); });
    </script>
</body>
</html>
