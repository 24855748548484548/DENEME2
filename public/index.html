<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowChat | Neon Sohbet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; overflow: hidden; }
        .neon-text { text-shadow: 0 0 15px rgba(16, 185, 129, 0.8); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .msg-area { height: calc(100vh - 180px); }
        .gradient-bg { background: radial-gradient(circle at top right, #064e3b 0%, #020617 40%); }
        .online-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="gradient-bg flex items-center justify-center min-h-screen">

    <div id="login-screen" class="w-full max-w-md p-10 glass-panel rounded-[2.5rem] shadow-2xl animate__animated animate__zoomIn">
        <div class="text-center mb-10">
            <div class="inline-block w-16 h-16 bg-emerald-500 rounded-2xl mb-4 shadow-[0_0_30px_rgba(16,185,129,0.5)] flex items-center justify-center animate__animated animate__pulse animate__infinite">
                 <svg class="w-10 h-10 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h1 class="text-5xl font-black neon-text italic tracking-tighter">Glow<span class="text-emerald-500">Chat</span></h1>
            <p class="text-emerald-500/50 text-xs mt-2 font-bold tracking-[0.3em] uppercase">Geleceğin Sohbeti</p>
        </div>
        
        <div class="space-y-4">
            <div class="relative">
                <input id="uName" type="text" placeholder="Kullanıcı Adı" class="w-full bg-white/5 p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-500 border border-white/10 transition-all">
            </div>
            <input id="uPass" type="password" placeholder="Profil Şifren" class="w-full bg-white/5 p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-500 border border-white/10 transition-all">
            <input id="uRoom" type="text" placeholder="Oda İsmi" class="w-full bg-white/5 p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-500 border border-white/10 transition-all">
            <button onclick="enterGlow()" class="w-full bg-emerald-500 hover:bg-emerald-400 p-5 rounded-2xl font-black text-black shadow-[0_10px_30px_rgba(16,185,129,0.3)] transition-all transform active:scale-95">BAĞLAN VE PARLA</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden w-full h-screen lg:h-[90vh] lg:max-w-6xl glass-panel lg:rounded-[3rem] flex flex-row overflow-hidden animate__animated animate__fadeIn">
        
        <div class="hidden md:flex w-72 border-r border-white/10 flex-col p-8 bg-black/40">
            <div class="flex items-center gap-2 mb-8">
                <div class="w-2 h-2 bg-emerald-500 rounded-full online-dot"></div>
                <h3 class="text-xs font-bold text-emerald-500 tracking-[0.2em] uppercase">Aktif Kişiler</h3>
            </div>
            <div id="online-list" class="space-y-4 overflow-y-auto"></div>
        </div>

        <div class="flex-1 flex flex-col">
            <header class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5 backdrop-blur-md">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-black font-black" id="roomIcon">G</div>
                    <div>
                        <h2 id="roomName" class="text-lg font-bold"></h2>
                        <span class="text-[10px] text-emerald-500/70 font-bold uppercase tracking-widest">Uçtan Uca Şifreli</span>
                    </div>
                </div>
                <button onclick="location.reload()" class="p-2 hover:bg-white/10 rounded-xl transition-all">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </header>

            <div id="msgBox" class="flex-1 p-6 overflow-y-auto flex flex-col gap-5 msg-area"></div>

            <footer class="p-6">
                <div class="flex items-center gap-3 bg-white/5 p-2 rounded-[2rem] border border-white/10 focus-within:border-emerald-500/50 shadow-inner">
                    <input id="mInput" type="text" placeholder="Mesajını buraya bırak..." class="flex-1 bg-transparent p-4 outline-none px-6 text-sm">
                    <button onclick="sendGlow()" class="bg-emerald-500 text-black w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20 hover:scale-105 transition-all">
                        <svg class="w-6 h-6 rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";

        function enterGlow() {
            const username = document.getElementById('uName').value;
            const password = document.getElementById('uPass').value;
            const room = document.getElementById('uRoom').value;
            if(username && password && room) {
                myName = username;
                socket.emit('auth-attempt', { username, password, room });
            }
        }

        socket.on('login-success', (data) => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('roomName').innerText = data.room;
            document.getElementById('roomIcon').innerText = data.room[0].toUpperCase();
        });

        socket.on('update-online-list', (list) => {
            const container = document.getElementById('online-list');
            container.innerHTML = list.map(user => `
                <div class="flex items-center gap-3 p-2 rounded-2xl hover:bg-white/5 transition-all">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-xs text-black font-black shadow-lg">${user[0].toUpperCase()}</div>
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-white">${user}</span>
                        <span class="text-[9px] text-emerald-500 font-bold uppercase tracking-tighter">Online</span>
                    </div>
                </div>
            `).join('');
        });

        function sendGlow() {
            const i = document.getElementById('mInput');
            if(i.value.trim()) {
                socket.emit('send-message', { text: i.value });
                i.value = "";
            }
        }

        socket.on('receive-message', (data) => {
            const isMe = data.sender === myName;
            const html = `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} animate__animated animate__fadeInUp animate__faster">
                    <div class="flex items-center gap-2 mb-1">
                         ${!isMe ? `<span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">${data.sender}</span>` : ''}
                    </div>
                    <div class="${isMe ? 'bg-emerald-500 text-black rounded-tr-none' : 'bg-white/10 text-white rounded-tl-none border border-white/5'} p-4 rounded-[1.5rem] max-w-[85%] shadow-2xl">
                        <p class="text-[15px] font-medium leading-relaxed">${data.text}</p>
                    </div>
                    <span class="text-[9px] text-slate-600 mt-2 font-bold">${data.time}</span>
                </div>
            `;
            const b = document.getElementById('msgBox');
            b.innerHTML += html;
            b.scrollTop = b.scrollHeight;
        });

        document.getElementById('mInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendGlow(); });
    </script>
</body>
</html>
